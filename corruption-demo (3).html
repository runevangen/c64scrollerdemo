/* ===== 3D-MATH ===== */
function rotY(v,a){const c=Math.cos(a),s=Math.sin(a);return[v[0]*c+v[2]*s,v[1],-v[0]*s+v[2]*c];}
function rotX(v,a){const c=Math.cos(a),s=Math.sin(a);return[v[0],v[1]*c-v[2]*s,v[1]*s+v[2]*c];}
function rotZ(v,a){const c=Math.cos(a),s=Math.sin(a);return[v[0]*c-v[1]*s,v[0]*s+v[1]*c,v[2]];}
function project(v,cx,cy,f){ if(v[2]<=0.5)return null; return[(v[0]/v[2])*f+cx,(-v[1]/v[2])*f+cy]; }

/* ===== VEKTORFONT (3D-LOGO) ===== */
const letterSegments={
  'C':[[[4,4],[0,4]],[[0,4],[0,1]],[[0,1],[4,1]]],
  'O':[[[1,4],[3,4]],[[3,4],[4,3]],[[4,3],[4,2]],[[4,2],[3,1]],[[3,1],[1,1]],[[1,1],[0,2]],[[0,2],[0,3]],[[0,3],[1,4]]],
  'R':[[[0,1],[0,4]],[[0,4],[4,4]],[[4,4],[4,2.5]],[[4,2.5],[0,2.5]],[[2.5,2.5],[4,1]]],
  'U':[[[0,4],[0,1.5]],[[0,1.5],[1,1]],[[1,1],[3,1]],[[3,1],[4,1.5]],[[4,1.5],[4,4]]],
  'P':[[[0,1],[0,4]],[[0,4],[4,4]],[[4,4],[4,2.5]],[[4,2.5],[0,2.5]]],
  'T':[[[0,4],[4,4]],[[2,4],[2,1]]],
  'I':[[[0,4],[4,4]],[[2,4],[2,1]],[[0,1],[4,1]]],
  'N':[[[0,1],[0,4]],[[0,4],[4,1]],[[4,1],[4,4]]],
};
const wordLetters="CORRUPTION".split('');
const perLetterEdges=wordLetters.map(L=>{
  const segs=letterSegments[L]; if(!segs)return[];
  const e=[]; const lcx=2,lcy=2.5,d=0.7;
  for(const [[x1,y1],[x2,y2]] of segs){
    const a=[x1-lcx,y1-lcy], b=[x2-lcx,y2-lcy];
    e.push([[a[0],a[1],-d],[b[0],b[1],-d]]);
    e.push([[a[0],a[1], d],[b[0],b[1], d]]);
    e.push([[a[0],a[1],-d],[a[0],a[1], d]]);
    e.push([[b[0],b[1],-d],[b[0],b[1], d]]);
  } return e;
});
function drawLogo3D(){
  if(state.logoVisibleFrame===null) return;
  const el=frame-state.logoVisibleFrame, alpha=Math.min(1,el/60);
  const cx=SW/2, cy=22, focal=160, camZ=60, scale=1.9;
  const cs=5, totalW=wordLetters.length*cs-1, xOff=-totalW/2+2;
  ctx.save(); ctx.globalAlpha=alpha; ctx.lineWidth=1;
  for(let i=0;i<wordLetters.length;i++){
    const rs=state.letterRotStart[i]; let yaw,pitch,roll;
    if(rs===null){ yaw=0.15; pitch=0.10; roll=0; }
    else{ const t=frame-rs, r=Math.min(1,t/60);
      yaw=Math.sin(t*0.013)*1.15*r+0.15*(1-r);
      pitch=Math.sin(t*0.008)*0.20*r+0.10*(1-r);
      roll=Math.sin(t*0.005)*0.08*r; }
    const lx=xOff+i*cs;
    const tf=v=>{ let p=[v[0],v[1],v[2]]; p=rotZ(p,roll); p=rotX(p,pitch); p=rotY(p,yaw);
      p=[p[0]+lx,p[1],p[2]]; return [p[0]*scale,p[1]*scale,p[2]*scale+camZ]; };
    for(const [v1,v2] of perLetterEdges[i]){
      const p1=tf(v1),p2=tf(v2), s1=project(p1,cx,cy,focal), s2=project(p2,cx,cy,focal);
      if(s1&&s2){ const az=(p1[2]+p2[2])/2, tg=Math.max(0,Math.min(1,1-(az-camZ+3)/8));
        ctx.strokeStyle = tg>0.6?C64.white:(tg>0.3?C64.lightBlue:C64.blue);
        ctx.beginPath(); ctx.moveTo(s1[0],s1[1]); ctx.lineTo(s2[0],s2[1]); ctx.stroke(); }
    }
  }
  ctx.restore();
}

/* ===== ELITE COBRA MK III ===== */
const cobraVerts=[[0,0,-3],[0,0.7,-0.3],[0,0,1.6],[-2.6,0,1.5],[2.6,0,1.5],[0,-0.45,0.4],[-0.4,0.4,-1.2],[0.4,0.4,-1.2]];
const cobraEdges=[[0,6],[0,7],[6,7],[6,1],[7,1],[1,2],[0,3],[0,4],[3,2],[4,2],[1,3],[1,4],[0,5],[5,2],[5,3],[5,4]];
function drawShip(){
  if(state.shipStart===null) return;
  const el=frame-state.shipStart;
  if(el<8){ ctx.fillStyle=`rgba(170,255,255,${(1-el/8)*0.5})`; ctx.fillRect(0,0,SW,SH); }
  const t=el*0.017;
  const px=Math.sin(t*0.55)*116+Math.sin(t*1.4)*18, py=Math.sin(t*0.43+1.1)*38, pz=28+Math.sin(t*0.31)*14;
  const vx=0.55*Math.cos(t*0.55)*116+1.4*Math.cos(t*1.4)*18;
  const yaw=Math.atan2(vx,1)+Math.PI, roll=-Math.sin(t*0.55)*0.6, pitch=Math.sin(t*0.5)*0.2;
  const scale=3.1, cx=SW/2, cy=SH/2, focal=185;
  const tf=v=>{ let p=[v[0]*scale,v[1]*scale,v[2]*scale]; p=rotZ(p,roll); p=rotX(p,pitch); p=rotY(p,yaw);
    return [p[0]+px,p[1]+py,p[2]+pz]; };
  const pts=cobraVerts.map(tf), scr=pts.map(p=>project(p,cx,cy,focal));
  for(let pass=0;pass<2;pass++){
    ctx.lineWidth = pass===0?3:1.4;
    for(const [a,b] of cobraEdges){ const s1=scr[a],s2=scr[b]; if(s1&&s2){
      if(pass===0) ctx.strokeStyle=C64.blue;
      else { const az=(pts[a][2]+pts[b][2])/2, t2=Math.max(0,Math.min(1,1-(az-15)/35)); ctx.strokeStyle=t2>0.5?C64.white:C64.cyan; }
      ctx.beginPath(); ctx.moveTo(s1[0],s1[1]); ctx.lineTo(s2[0],s2[1]); ctx.stroke(); } }
  }
  ctx.fillStyle=C64.white;
  for(const s of scr){ if(s) ctx.fillRect(Math.round(s[0])-1,Math.round(s[1])-1,2,2); }
}

function drawSprite(sp,fi,x,y,px,flip){
  const f=sp.frames[fi%sp.frames.length], pal=sp.palette, w=f[0].length;
  for(let r=0;r<f.length;r++){ const line=f[r];
    for(let c=0;c<line.length;c++){ const ch=line[c]; if(ch==='.')continue; const col=pal[ch]; if(!col)continue;
      const dc=flip?(w-1-c):c; ctx.fillStyle=col; ctx.fillRect(Math.round(x+dc*px),Math.round(y+r*px),px,px); } }
}
function spawnInsideSprite(){ spriteState.insideSprite={type:'viper',x:0,y:0,flipX:false}; }
const borderSprites=[];
function spawnBorderWave(){
  const ch=['viper','option','fireball'][Math.floor(Math.random()*3)];
  const bands=[10, CH-26, SY-6, SY+SH-10];
  const sy=bands[Math.floor(Math.random()*bands.length)];
  const dir=Math.random()<0.5?1:-1, sx0=dir>0?-34:CW+10, n=3+Math.floor(Math.random()*3), sp=1+Math.random()*1.1;
  for(let i=0;i<n;i++) borderSprites.push({type:ch,x:sx0-dir*i*28,y:sy,vx:dir*sp,bob:Math.random()*Math.PI*2,flipX:dir<0});
}
function updateSprites(){
  if(spriteState.phase>=1 && spriteState.insideSprite){
    const s=spriteState.insideSprite, t=(frame-spriteState.insideStart)*0.018;
    s.x=SX+SW/2+Math.sin(t)*92-14; s.y=SY+SH/2+Math.sin(t*2)*48-9; s.flipX=Math.cos(t)<0;
  }
  if(spriteState.phase>=2){
    if((frame-spriteState.borderStart)%75===0) spawnBorderWave();
    for(let i=borderSprites.length-1;i>=0;i--){ const s=borderSprites[i];
      s.x+=s.vx; s.y+=Math.sin(frame*0.08+s.bob)*0.4;
      if(s.x>CW+45||s.x<-45) borderSprites.splice(i,1); }
  }
}
function drawSprites(){
  const af=Math.floor(frame/8)%2;
  if(spriteState.phase>=1 && spriteState.insideSprite){ const s=spriteState.insideSprite; drawSprite(spriteData[s.type],af,s.x,s.y,2,s.flipX); }
  for(const s of borderSprites) drawSprite(spriteData[s.type],af,s.x,s.y,2,s.flipX);
}

  'COPPER':()=>{state.copperBarsStart=frame;},

function processText(raw){
  const triggers=[]; let text='', i=0;
  while(i<raw.length){ if(raw[i]==='{'){ const e=raw.indexOf('}',i); if(e!==-1){ const m=raw.substring(i+1,e);
    if(markerActions[m]) triggers.push({atChar:text.length,marker:m,fired:false}); i=e+1; continue; } }
    text+=raw[i]; i++; }
  return {text,triggers};
}
const {text:tributeText, triggers:stageTriggers}=processText(rawText);
const TRIGGER="CORRUPTION", triggerIndices=[];
{ let p=-1; while((p=tributeText.indexOf(TRIGGER,p+1))!==-1) triggerIndices.push(p); }

let scrollX=SW; const charW=11, baseY=SH/2+8, SCROLL_SPEED=1.5;
const triggeredPass=new Set();
function sinusYOffset(x){
  if(state.sineStart===null) return 0;
  const r=Math.min(1,(frame-state.sineStart)/180), br=1+Math.sin(frame*0.009)*0.22;
  return (Math.sin((x+frame*2.6)*0.026)*28 + Math.sin((x+frame*1.7)*0.062)*9)*br*r;
}
const bgStars=[];
for(let i=0;i<45;i++) bgStars.push({x:Math.random()*SW,y:Math.random()*SH,speed:0.2+Math.random()*1.4,bright:Math.random()});
const shower=[];
function spawnStars(){ const n=12+Math.floor(Math.random()*6);
  for(let i=0;i<n;i++) shower.push({x:Math.random()*(SW+30)-15,y:-15-Math.random()*60,vx:(Math.random()-0.5)*0.3,vy:0.4+Math.random()*0.9,sway:Math.random()*Math.PI*2,swaySpeed:0.03+Math.random()*0.05,size:9+Math.random()*8,col:Math.random()<0.5?C64.yellow:C64.white,life:1.0}); }
function updateShower(){ for(let i=shower.length-1;i>=0;i--){ const s=shower[i];
  s.sway+=s.swaySpeed; s.x+=s.vx+Math.sin(s.sway)*0.4; s.y+=s.vy; s.life-=0.0022;
  if(s.y>SH+20||s.life<=0) shower.splice(i,1); } }
function drawShower(){ ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const s of shower){ ctx.globalAlpha=Math.max(0,Math.min(1,s.life)); ctx.font=`${Math.floor(s.size)}px monospace`;
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillText('★',Math.floor(s.x)+1,Math.floor(s.y)+1);
    ctx.fillStyle=s.col; ctx.fillText('★',Math.floor(s.x),Math.floor(s.y)); } ctx.restore(); }
function drawBgStars(){ for(const s of bgStars){ s.x-=s.speed; if(s.x<0){s.x=SW;s.y=Math.random()*SH;}
  const b=(Math.sin(frame*0.06+s.bright*10)+1)/2, c=Math.floor(60+b*195);
  ctx.fillStyle=`rgb(${c},${c},${c})`; ctx.fillRect(Math.floor(s.x),Math.floor(s.y),1,1); } }
function drawScroller(){
  ctx.font='bold 16px monospace'; ctx.textBaseline='middle'; ctx.textAlign='left';
  const a=Math.max(0,Math.floor(-scrollX/charW)-1), z=Math.min(tributeText.length,Math.ceil((-scrollX+SW)/charW)+1);
  for(let i=a;i<z;i++){ const x=scrollX+i*charW, y=baseY+sinusYOffset(x);
    const col=scrollerColors[(i+Math.floor(frame/6))%scrollerColors.length];
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillText(tributeText[i],Math.floor(x)+2,Math.floor(y)+2);
    ctx.fillStyle=col; ctx.fillText(tributeText[i],Math.floor(x),Math.floor(y)); }
  const cc=Math.floor((SW/2-scrollX)/charW);
  for(const t of stageTriggers){ if(!t.fired && cc>=t.atChar){ t.fired=true; markerActions[t.marker](); } }
  if(state.starsActive){ for(const idx of triggerIndices){ if(triggeredPass.has(idx))continue;
    const wcx=scrollX+(idx+TRIGGER.length/2)*charW; if(wcx>0&&wcx<SW){ triggeredPass.add(idx); spawnStars(); } } }
  scrollX-=SCROLL_SPEED;
  if(scrollX<-tributeText.length*charW){ scrollX=SW; triggeredPass.clear(); }
}
function drawCopperBars(){

/* ===== C64 BOOT-SKJERM ===== */
const READY_SCREEN=[
  "    **** COMMODORE 64 BASIC V2 ****",
  "",

function getBootContent(){
  if(phase==='boot') return {lines:[...READY_SCREEN], cursor:true, hint:true};
  let t=bootFrame; const lines=[...READY_SCREEN];
  const loadCmd='LOAD"THE DEMO",8,1';
  const lt=Math.min(loadCmd.length,Math.floor(t/4));
  lines.push(loadCmd.substring(0,lt));
  if(lt<loadCmd.length) return {lines,cursor:true,typing:true};
  t-=loadCmd.length*4;
  if(t<30) return {lines,cursor:true};
  t-=30;
  lines.push(""); lines.push("SEARCHING FOR THE DEMO");
  if(t<70) return {lines,cursor:false};
  t-=70;
  lines.push("LOADING");
  if(t<150) return {lines,cursor:false,loading:true};
  t-=150;
  lines.push("READY.");
  if(t<40) return {lines,cursor:true};
  t-=40;
  const runCmd='RUN', rt=Math.min(runCmd.length,Math.floor(t/5));
  lines.push(runCmd.substring(0,rt));
  if(rt<runCmd.length) return {lines,cursor:true,typing:true};
  t-=runCmd.length*5;
  if(t<25) return {lines,cursor:true};
  return {lines,cursor:false,done:true};
}
function drawBootScreen(){
  const ct=getBootContent();
  ctx.save(); ctx.translate(SX,SY);
  ctx.font='8px "Courier New",monospace'; ctx.textBaseline='top'; ctx.textAlign='left';
  ctx.fillStyle=C64.lightBlue;
  for(let r=0;r<ct.lines.length;r++){ const line=ct.lines[r];
    for(let c=0;c<line.length;c++) ctx.fillText(line[c], c*8+1, r*8+1); }
  if(ct.cursor && Math.floor(frame/16)%2===0){
    const lr=ct.lines.length-1, lc=ct.lines[lr].length;
    ctx.fillStyle=C64.lightBlue; ctx.fillRect(lc*8, lr*8, 8, 8); }
  if(ct.hint && Math.floor(frame/22)%2===0){
    ctx.fillStyle=C64.lightGrey;
    const h="<CLICK / TAP TO LOAD>";
    for(let c=0;c<h.length;c++) ctx.fillText(h[c], c*8+1, 9*8+1); }
  ctx.restore();
  // Lyder
  const totalLen=ct.lines.join('').length;
  if(phase==='loading' && ct.typing && totalLen>prevBootLen) playKeyClick();
  prevBootLen=totalLen;
  if(ct.loading && frame%3===0) playLoadChirp();
  if(ct.done && phase==='loading'){ phase='demo'; startMusic(); }
}

/* ===== HOVED-LOOP ===== */
function draw(){
  frame++;
  ctx.fillStyle=C64.lightBlue; ctx.fillRect(0,0,CW,CH);
  if(phase==='demo'){
    ctx.fillStyle=C64.black; ctx.fillRect(SX,SY,SW,SH);
    ctx.save(); ctx.beginPath(); ctx.rect(SX,SY,SW,SH); ctx.clip(); ctx.translate(SX,SY);
    drawBgStars(); drawLogo3D(); drawScroller(); drawCopperBars(); drawShip(); updateShower(); drawShower();
    ctx.restore();
    updateSprites(); drawSprites();
  } else {
    ctx.fillStyle=C64.blue; ctx.fillRect(SX,SY,SW,SH);
    if(phase==='loading') bootFrame++;
    drawBootScreen();
  }
}

/* Frekvens-uavhengig loop: kjører alltid ~60 logiske bilder i sekundet,
   uansett om skjermen er 60, 120, 144 Hz osv. Dette gjør at scrollteksten
   (og alt annet) holder samme hastighet på alle maskiner. */
let lastDraw = performance.now();
const TARGET_MS = 1000 / 60;
function loop(now){
  requestAnimationFrame(loop);
  const elapsed = now - lastDraw;
  if(elapsed < TARGET_MS - 1) return;          // for tidlig — hopp over dette refresh-et
  lastDraw += TARGET_MS;
  if(now - lastDraw > TARGET_MS * 3) lastDraw = now;   // resync etter f.eks. inaktiv fane
  draw();
}

/* =========================================================================
   MUSIKK — Rob Hubbard-inspirert SID-motor
   Rask arpeggio-"shimmer", drivende oktav-bass, trommer, 16-takters loop.
   Look-ahead scheduler for stram timing.
   ========================================================================= */
const NF={A2:110,AS2:116.54,B2:123.47,C3:130.81,CS3:138.59,D3:146.83,DS3:155.56,E3:164.81,F3:174.61,FS3:185,G3:196,GS3:207.65,A3:220,AS3:233.08,B3:246.94,C4:261.63,CS4:277.18,D4:293.66,DS4:311.13,E4:329.63,F4:349.23,FS4:369.99,G4:392,GS4:415.3,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.25};
// 16-takters akkordprogresjon (Am F C G / Am F C E / Dm Dm Am Am / F G C E)
const prog=[
  ['A3','C4','E4'],['F3','A3','C4'],['C4','E4','G4'],['G3','B3','D4'],
  ['A3','C4','E4'],['F3','A3','C4'],['C4','E4','G4'],['E3','GS3','B3'],
  ['D3','F3','A3'],['D3','F3','A3'],['A3','C4','E4'],['A3','C4','E4'],
  ['F3','A3','C4'],['G3','B3','D4'],['C4','E4','G4'],['E3','GS3','B3'],
];
const TICK=0.02;          // 20 ms (50 Hz, som PAL)
const ARP_TICKS=3;        // arp-note hver 60 ms
const EIGHTH=12, BEAT=24, BAR=96;   // 96 ticks/takt = 125 BPM
function arpFreqs(ch){ const r=NF[ch[0]],t=NF[ch[1]],f=NF[ch[2]]; return [r,t,f,r*2,f,t]; }

function playArp(freq,time){
  const o=audioCtx.createOscillator(), o2=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='square'; o2.type='square'; o.frequency.value=freq; o2.frequency.value=freq; o2.detune.value=9;
  g.gain.setValueAtTime(0,time); g.gain.linearRampToValueAtTime(0.05,time+0.003); g.gain.exponentialRampToValueAtTime(0.0001,time+0.09);
  o.connect(g); o2.connect(g); g.connect(masterGain);
  o.start(time); o2.start(time); o.stop(time+0.1); o2.stop(time+0.1);
}
function playBass(freq,time){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain(), lp=audioCtx.createBiquadFilter();
  o.type='sawtooth'; o.frequency.value=freq; lp.type='lowpass'; lp.frequency.value=900;
  g.gain.setValueAtTime(0,time); g.gain.linearRampToValueAtTime(0.2,time+0.006); g.gain.exponentialRampToValueAtTime(0.0001,time+0.16);
  o.connect(lp).connect(g).connect(masterGain); o.start(time); o.stop(time+0.18);
}
function playKick(time){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(150,time); o.frequency.exponentialRampToValueAtTime(45,time+0.12);
  g.gain.setValueAtTime(0.42,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.18);
  o.connect(g).connect(masterGain); o.start(time); o.stop(time+0.2);
}
function playSnare(time){
  const bs=audioCtx.sampleRate*0.1, b=audioCtx.createBuffer(1,bs,audioCtx.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<bs;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/bs*8);
  const ns=audioCtx.createBufferSource(); ns.buffer=b;
  const bp=audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800;
  const g=audioCtx.createGain(); g.gain.value=0.16;
  ns.connect(bp).connect(g).connect(masterGain); ns.start(time);
}
function playHat(time){
  const bs=audioCtx.sampleRate*0.04, b=audioCtx.createBuffer(1,bs,audioCtx.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<bs;i++) d[i]=Math.random()*2-1;
  const ns=audioCtx.createBufferSource(); ns.buffer=b;
  const hp=audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=8000;
  const g=audioCtx.createGain(); g.gain.setValueAtTime(0.06,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.03);
  ns.connect(hp).connect(g).connect(masterGain); ns.start(time);
}
function playWhoosh(){
  if(!audioCtx)return; const n=audioCtx.currentTime;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(1400,n); o.frequency.exponentialRampToValueAtTime(50,n+0.6);
  g.gain.setValueAtTime(0.18,n); g.gain.exponentialRampToValueAtTime(0.001,n+0.6);
  o.connect(g).connect(masterGain); o.start(n); o.stop(n+0.7);
}
function playKeyClick(){
  if(!audioCtx)return; const n=audioCtx.currentTime;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='square'; o.frequency.value=1100+Math.random()*500;
  g.gain.setValueAtTime(0.05,n); g.gain.exponentialRampToValueAtTime(0.0001,n+0.03);
  o.connect(g).connect(masterGain); o.start(n); o.stop(n+0.03);
}
function playLoadChirp(){
  if(!audioCtx)return; const n=audioCtx.currentTime;
  const bs=audioCtx.sampleRate*0.02, b=audioCtx.createBuffer(1,bs,audioCtx.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<bs;i++) d[i]=Math.random()*2-1;
  const ns=audioCtx.createBufferSource(); ns.buffer=b;
  const bp=audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800+Math.random()*2200;
  const g=audioCtx.createGain(); g.gain.value=0.035;
  ns.connect(bp).connect(g).connect(masterGain); ns.start(n);
}

let mtick=0, nextTickTime=0, schedulerInterval=null;
function scheduleTick(tick,time){
  const bar=Math.floor(tick/BAR)%prog.length, ch=prog[bar], pos=tick%BAR;
  if(tick%ARP_TICKS===0){ const arp=arpFreqs(ch); playArp(arp[Math.floor(tick/ARP_TICKS)%arp.length], time); }
  if(pos%EIGHTH===0){ const e=pos/EIGHTH, rf=NF[ch[0]]/2; playBass((e%2===0)?rf:rf*2, time); }
  if(pos===0||pos===BEAT*2) playKick(time);
  if(pos===BEAT||pos===BEAT*3) playSnare(time);
  if(pos%EIGHTH===0) playHat(time);
}
function scheduler(){
  if(!audioCtx)return;
  while(nextTickTime < audioCtx.currentTime+0.12){ scheduleTick(mtick,nextTickTime); mtick++; nextTickTime+=TICK; }
}
function startMusic(){
  if(musicStarted||!audioCtx)return; musicStarted=true;
  mtick=0; nextTickTime=audioCtx.currentTime+0.06;
  schedulerInterval=setInterval(scheduler,25);
}

/* ===== KLIKK / OPPSTART ===== */
function handleStart(){
  if(phase!=='boot')return;
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain(); masterGain.gain.value=0.42;
    const comp=audioCtx.createDynamicsCompressor();
    masterGain.connect(comp).connect(audioCtx.destination);
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  phase='loading'; bootFrame=0; prevBootLen=READY_SCREEN.join('').length;
}
document.addEventListener('click',handleStart);
document.addEventListener('touchstart',e=>{e.preventDefault();handleStart();},{passive:false});

requestAnimationFrame(loop);
</script>
</body>
